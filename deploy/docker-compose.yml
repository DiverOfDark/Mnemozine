# Mnemozine — local dev / homelab stack (PRD Deliverable #1, §5.5 "docker-compose").
#
# A plain `docker compose -f deploy/docker-compose.yml up -d --build` brings up
# exactly THREE long-running services:
#   falkordb     — single graph + vector store (FR-STO-2)
#   ollama       — bge-m3 embeddings + a qwen extraction model, self-hosted (PRD §5.5)
#   mnemozine    — the all-in-one app: runs the `mnemozine` console script
#                  (mnemozine.app:run_all), which builds the Container once and
#                  concurrently runs every ENABLED component (MCP + ingest +
#                  maintenance + web) under one asyncio loop.
#
# Plus one one-shot helper that exits after it finishes:
#   ollama-init  — pulls BOTH the bge-m3 embedding model AND a qwen extraction
#                  model into the shared ollama volume so the stack is usable
#                  end-to-end on first `up`.
#
# OPTIONAL profiles (NOT started by a plain `up`):
#   --profile gateway        litellm — OpenAI-format gateway + logging callback
#                            for gateway/Hermes INGESTION capture (FR-ING-3).
#   --profile qwen-llamacpp  qwen — a llama.cpp OpenAI-format server, an
#                            ALTERNATIVE extraction backend to ollama-served qwen.
#   --profile eval           mnemozine-eval — the §9 scaling assertion (one-shot).
#
# Usage (from the repo root):
#   cp .env.example .env        # then edit endpoints/keys
#   docker compose -f deploy/docker-compose.yml up -d --build
#
# Single port: with MNEMOZINE_RUN__WEB=true AND MNEMOZINE_RUN__MCP=true (both
# default true), run_all serves the FastAPI WebUI AND the MCP streamable-http
# transport from ONE port — MNEMOZINE_WEB__PORT (default 8765). The WebUI/API is
# at http://<host>:8765/ (API under /api) and a networked MCP client connects to
# http://<host>:8765/mcp. Only 8765 is published for the all-in-one.
#
# Split ingest onto another machine: see deploy/docker-compose.ingest.yml. On the
# homelab you can instead set MNEMOZINE_RUN__INGEST=false on this all-in-one
# service so a remote box owns ingestion.
#
# NOTE: env_file paths are resolved relative to this compose file's directory,
# so `../.env` points at the repo-root .env. The build context is the repo root
# (`..`) because the Dockerfile installs from pyproject.toml + mnemozine/.

x-mnemozine-image: &mnemozine-image
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  image: ${MNEMOZINE_IMAGE:-mnemozine:local}

# Shared inter-service connection env, as a reusable YAML MAP anchor. Services
# merge it INTO their own `environment:` map with `<<: *mnemozine-conn-env` so
# per-service keys and these shared keys coexist (a top-level `<<` on the service
# would make a second `environment:` block REPLACE this one — YAML does not deep
# -merge maps, hence the in-map merge here).
#
# These keys are set under `environment:`, which in Compose ALWAYS overrides
# env_file — so the in-cluster service hostnames win over the localhost defaults
# baked into .env / .env.example, and containers reach each other by service name.
# The MZ_COMPOSE_* interpolation vars (NOT present in .env) let an operator
# override without being shadowed by the MNEMOZINE_* localhost values in .env.
#
# DEFAULT extraction targets OLLAMA's OpenAI-compatible endpoint (no separate
# qwen + litellm required). The model id is a LiteLLM id: because we hit Ollama's
# OpenAI-compatible `/v1` path (NOT Ollama's native API), the id MUST be prefixed
# `openai/` and the base_url MUST carry the `/v1` suffix. (LiteLLM's `ollama/`
# provider speaks Ollama's NATIVE /api/* endpoints and would 404 against /v1.)
x-mnemozine-conn-env: &mnemozine-conn-env
  MNEMOZINE_FALKORDB__URL: ${MZ_COMPOSE_FALKORDB_URL:-redis://falkordb:6379}
  MNEMOZINE_EMBEDDING__BASE_URL: ${MZ_COMPOSE_OLLAMA_URL:-http://ollama:11434}
  MNEMOZINE_EMBEDDING__MODEL: ${MNEMOZINE_EMBEDDING__MODEL:-bge-m3}
  MNEMOZINE_EMBEDDING__DIMENSIONS: ${MNEMOZINE_EMBEDDING__DIMENSIONS:-1024}
  # Extraction is served by Ollama's OpenAI-compatible endpoint by default.
  MNEMOZINE_EXTRACTION__BASE_URL: ${MZ_COMPOSE_EXTRACTION_URL:-http://ollama:11434/v1}
  MNEMOZINE_EXTRACTION__MODEL: ${MZ_COMPOSE_EXTRACTION_MODEL:-openai/qwen2.5}
  MNEMOZINE_EXTRACTION__API_KEY: ${MZ_COMPOSE_EXTRACTION_API_KEY:-not-needed}
  MNEMOZINE_LOG_LEVEL: ${MZ_COMPOSE_LOG_LEVEL:-INFO}

x-mnemozine-env: &mnemozine-env
  env_file:
    - ../.env
  environment:
    <<: *mnemozine-conn-env

services:
  # -------------------------------------------------------------------------
  # FalkorDB — single graph + vector store (FR-STO-2). Redis-protocol on 6379.
  # -------------------------------------------------------------------------
  falkordb:
    # Explicit, non-floating pin (matches falkordb/falkordb:latest digest as of
    # 2026-06-10). Verified to support `CALL db.idx.vector.queryNodes` — the
    # index-backed KNN seam FR-RET-2 depends on (graph module ver 41810, Redis
    # 8.6.3). Do not float this to `latest`; bump deliberately + re-run the probe.
    image: ${FALKORDB_IMAGE:-falkordb/falkordb:v4.18.10}
    restart: unless-stopped
    ports:
      - "${FALKORDB_PORT:-6379}:6379"
    command: >
      redis-server
      --loadmodule /var/lib/falkordb/bin/falkordb.so
      --dir /data
      ${FALKORDB_PASSWORD_ARG:-}
    volumes:
      - falkordb-data:/data
    healthcheck:
      # PING is enough to assert the Redis/FalkorDB endpoint is serving.
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # -------------------------------------------------------------------------
  # Ollama — serves bge-m3 embeddings AND a qwen extraction model (PRD §5.5).
  # Its OpenAI-compatible /v1 endpoint is the DEFAULT extraction backend, so the
  # separate qwen + litellm services are no longer required by default.
  # -------------------------------------------------------------------------
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.6.8}
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # Ollama exposes a bare 200 on / once the HTTP server is up.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot pull of BOTH the embedding model (bge-m3) AND a qwen extraction
  # model into the shared ollama volume so the stack is usable end-to-end on
  # first `up` (PRD: must run against local models). Exits 0 when done.
  ollama-init:
    image: ${OLLAMA_IMAGE:-ollama/ollama:0.6.8}
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      # The qwen tag pulled for extraction; must match the model half of
      # MNEMOZINE_EXTRACTION__MODEL (default openai/qwen2.5 -> pulls qwen2.5).
      OLLAMA_QWEN_MODEL: ${OLLAMA_QWEN_MODEL:-qwen2.5}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'ollama pull ${MNEMOZINE_EMBEDDING__MODEL:-bge-m3} && ollama pull ${OLLAMA_QWEN_MODEL:-qwen2.5}'
    restart: "no"

  # -------------------------------------------------------------------------
  # Mnemozine — the all-in-one app (the contracted ~3-container collapse).
  #
  # Runs the `mnemozine` console script (= mnemozine.app:run_all): builds the
  # Container ONCE and concurrently runs every ENABLED component (MCP + ingest +
  # maintenance + web) under one asyncio loop. Graceful shutdown on SIGTERM.
  #
  # Single port 8765: WEB=true AND MCP=true -> WebUI/API at / and MCP at /mcp on
  # MNEMOZINE_WEB__PORT. Mounts the host ~/.claude read-only for ingest.
  #
  # To split ingest off this box, set MNEMOZINE_RUN__INGEST=false here and run a
  # mnemozine-ingest elsewhere (deploy/docker-compose.ingest.yml).
  # -------------------------------------------------------------------------
  mnemozine:
    <<: [*mnemozine-image, *mnemozine-env]
    restart: unless-stopped
    command: ["mnemozine"]
    # Run AS THE HOST USER so the read-only ~/.claude bind mount (typically mode
    # 700, owned by your login user) is readable by the in-container ingest
    # watcher. Defaults to uid/gid 1000 (the usual single-user Linux login). If
    # your host user differs, set MNEMOZINE_UID/MNEMOZINE_GID in .env (`id -u`,
    # `id -g`). The image is otherwise non-root (uid 10001); this just remaps it.
    user: "${MNEMOZINE_UID:-1000}:${MNEMOZINE_GID:-1000}"
    # Graceful shutdown: run_all traps SIGTERM (compose's default stop signal).
    stop_signal: SIGTERM
    stop_grace_period: 30s
    depends_on:
      falkordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # Merge the shared inter-service connection env, then add app-specific keys.
      <<: *mnemozine-conn-env
      # Bind WebUI (and the mounted /mcp) to all interfaces inside the container
      # so the published port is reachable from outside. WebUI is local-operator
      # only — keep it on a private network and/or set MNEMOZINE_WEB__TOKEN.
      MNEMOZINE_WEB__HOST: 0.0.0.0
      MNEMOZINE_WEB__PORT: ${MNEMOZINE_WEB__PORT:-8765}
      # Fallback (WEB=false, MCP=true) standalone-MCP bind; harmless otherwise.
      MNEMOZINE_MCP_HOST: 0.0.0.0
      MNEMOZINE_MCP_PORT: ${MNEMOZINE_MCP_PORT:-8765}
      # Inside the container the Claude Code transcripts live at /claude.
      MNEMOZINE_INGEST__CLAUDE_CONFIG_DIR: /claude
      # Running as an arbitrary host uid (user: above) means no baked-in home
      # dir; give libraries a writable HOME for any caches.
      HOME: /tmp
    ports:
      # WebUI + /mcp share this one port (8765 by default).
      - "${MNEMOZINE_WEB__PORT:-8765}:8765"
    volumes:
      # Host Claude Code config dir, read-only, for the ingest watcher (FR-ING-2).
      - ${HOST_CLAUDE_CONFIG_DIR:-${HOME}/.claude}:/claude:ro
    healthcheck:
      # The WebUI/MCP app speaks HTTP on 8765; a probe confirms it accepts conns.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://127.0.0.1:8765/ || curl -fsS -o /dev/null http://127.0.0.1:8765/mcp || curl -fsS -o /dev/null http://127.0.0.1:8765/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 40s

  # -------------------------------------------------------------------------
  # OPTIONAL — qwen via llama.cpp (`--profile qwen-llamacpp`).
  #
  # An ALTERNATIVE to the default ollama-served extraction: a llama.cpp
  # OpenAI-compatible server. To use it, start this profile and repoint
  # extraction at it, e.g. in .env:
  #   MZ_COMPOSE_EXTRACTION_URL=http://qwen:8000/v1
  #   MZ_COMPOSE_EXTRACTION_MODEL=openai/qwen2.5
  # Supply a GGUF model via QWEN_MODEL / the qwen-models volume.
  # -------------------------------------------------------------------------
  qwen:
    image: ${QWEN_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    profiles: ["qwen-llamacpp"]
    restart: unless-stopped
    ports:
      - "${QWEN_PORT:-8000}:8000"
    volumes:
      - qwen-models:/models
    command: >
      -m /models/${QWEN_MODEL:-qwen2.5-7b-instruct-q4_k_m.gguf}
      --host 0.0.0.0
      --port 8000
      --alias qwen2.5
      -c ${QWEN_CONTEXT:-8192}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # -------------------------------------------------------------------------
  # OPTIONAL — LiteLLM gateway (`--profile gateway`).
  #
  # OpenAI-format gateway + logging callback for gateway/Hermes INGESTION capture
  # (FR-ING-3): fronts repointable agents behind one base_url and emits a
  # common-schema event per turn into the ingestion path. NOT required for the
  # default ollama-served extraction. By default it fronts the llama.cpp `qwen`
  # service, so typically run it together with the qwen-llamacpp profile:
  #   docker compose -f deploy/docker-compose.yml --profile gateway --profile qwen-llamacpp up -d
  # -------------------------------------------------------------------------
  litellm:
    image: ${LITELLM_IMAGE:-ghcr.io/berriai/litellm:main-stable}
    profiles: ["gateway"]
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-mnemozine-local}
      # Upstream extraction endpoint the gateway proxies to. Defaults to the
      # llama.cpp qwen service; point at ollama (http://ollama:11434/v1) to front
      # the default ollama-served model instead.
      QWEN_API_BASE: ${QWEN_API_BASE:-http://qwen:8000/v1}
      QWEN_API_KEY: ${QWEN_API_KEY:-not-needed}
      OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}
    volumes:
      - ./litellm.config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:4000/health/liveliness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s

  # -------------------------------------------------------------------------
  # OPTIONAL — Eval harness (`--profile eval`).
  #
  # The §9 "precision stays flat as the store grows" assertion (Goal-5 /
  # FR-RET-2). One-shot, on-demand: runs the eval CLI's `scaling` subcommand
  # across distractor-inflation levels and exits 0/1. Run it explicitly with:
  #   docker compose -f deploy/docker-compose.yml --profile eval run --rm mnemozine-eval
  # The default `scaling` run is offline; it shares the app image + env so it can
  # also be pointed at the live store.
  # -------------------------------------------------------------------------
  mnemozine-eval:
    <<: [*mnemozine-image, *mnemozine-env]
    profiles: ["eval"]
    restart: "no"
    command: ["mnemozine-eval", "scaling"]
    depends_on:
      falkordb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      <<: *mnemozine-conn-env

volumes:
  falkordb-data:   # FalkorDB persistence (graph + vectors) — survives restarts.
  ollama-data:     # pulled models (bge-m3 + the qwen extraction model).
  qwen-models:     # local GGUF / model weights for the optional llama.cpp qwen.
