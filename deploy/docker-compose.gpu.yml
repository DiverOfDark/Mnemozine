# GPU override — give Ollama the host NVIDIA GPU for embeddings + extraction.
#
# Use alongside the main compose file:
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.gpu.yml up -d
#
# This host exposes the GPU via CDI (nvidia-ctk; `docker info` shows
# `cdi: nvidia.com/gpu=all`) and has NO legacy `nvidia` runtime, so we request
# the GPU as a CDI device. On hosts with the classic nvidia runtime instead, use
# `driver: nvidia` + `count: all`. Without a GPU, omit this file (Ollama -> CPU).
services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids:
                - nvidia.com/gpu=all
              capabilities: [gpu]
