{{/*
Shared Secret: sensitive MNEMOZINE_* values (FalkorDB password, extraction API
key). Always rendered (possibly with just the api key) so workloads can mount it
via envFrom unconditionally. Values here override the ConfigMap when the same
key appears, because envFrom is applied config-then-secret in the pod spec.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mnemozine.secretName" . }}
  labels:
    {{- include "mnemozine.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  # Extraction endpoint API key (local servers ignore it; cloud needs a real one).
  MNEMOZINE_EXTRACTION__API_KEY: {{ .Values.litellm.upstream.apiKey | default "not-needed" | quote }}
  # Hermes endpoint API key (FR-ING-4); "not-needed" for the self-hosted VM.
  MNEMOZINE_INGEST__HERMES_API_KEY: {{ .Values.tuning.ingest.hermesApiKey | default "not-needed" | quote }}
  {{- if .Values.falkordb.password }}
  MNEMOZINE_FALKORDB__PASSWORD: {{ .Values.falkordb.password | quote }}
  {{- end }}
  {{- range $k, $v := .Values.extraSecrets }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
