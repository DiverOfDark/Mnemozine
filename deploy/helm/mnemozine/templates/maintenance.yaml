{{- if .Values.maintenance.enabled }}
{{- $name := include "mnemozine.maintenance.fullname" . -}}
{{- $component := "maintenance" -}}
{{- $cron := .Values.maintenance.cronSchedule | default .Values.tuning.maintenance.cron -}}
{{- if .Values.maintenance.asCronJob }}
---
# k8s-native CronJob variant: the cluster fires the job on schedule and the
# process runs the maintenance pass once then exits (FR-MNT-5, idempotent).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ $name }}
  labels:
    {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  schedule: {{ $cron | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 12 }}
        spec:
          serviceAccountName: {{ include "mnemozine.serviceAccountName" . }}
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: maintenance
              image: "{{ include "mnemozine.image" . }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command: {{ toJson .Values.maintenance.command }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              envFrom:
                - configMapRef:
                    name: {{ include "mnemozine.configMapName" . }}
                - secretRef:
                    name: {{ include "mnemozine.secretName" . }}
              {{- with .Values.maintenance.extraEnv }}
              env:
                {{- toYaml . | nindent 16 }}
              {{- end }}
              resources:
                {{- toYaml .Values.maintenance.resources | nindent 16 }}
          {{- with .Values.maintenance.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.maintenance.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.maintenance.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- else }}
---
# Long-lived Deployment variant (default): the process hosts APScheduler and
# fires the maintenance pass on MNEMOZINE_MAINTENANCE__CRON internally (FR-MNT-5).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: {{ .Values.maintenance.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mnemozine.componentSelectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "mnemozine.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: maintenance
          image: "{{ include "mnemozine.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.maintenance.command }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "mnemozine.configMapName" . }}
            - secretRef:
                name: {{ include "mnemozine.secretName" . }}
          {{- with .Values.maintenance.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.maintenance.livenessProbe.enabled }}
          livenessProbe:
            {{- omit .Values.maintenance.livenessProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.maintenance.resources | nindent 12 }}
      {{- with .Values.maintenance.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.maintenance.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.maintenance.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
