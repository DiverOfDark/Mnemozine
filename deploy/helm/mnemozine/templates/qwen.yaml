{{- if .Values.qwen.enabled }}
{{- $name := include "mnemozine.qwen.fullname" . -}}
{{- $component := "qwen" -}}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.qwen.service.type }}
  ports:
    - name: http
      port: {{ .Values.qwen.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mnemozine.componentSelectorLabels" (dict "root" . "component" $component) | nindent 4 }}
{{- if .Values.qwen.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $name }}-models
  labels:
    {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.qwen.persistence.accessModes | nindent 4 }}
  {{- if .Values.qwen.persistence.storageClass }}
  storageClassName: {{ .Values.qwen.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.qwen.persistence.size }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "mnemozine.componentSelectorLabels" (dict "root" . "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "mnemozine.componentLabels" (dict "root" . "component" $component) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qwen
          image: "{{ .Values.qwen.image.repository }}:{{ .Values.qwen.image.tag }}"
          imagePullPolicy: {{ .Values.qwen.image.pullPolicy }}
          # llama.cpp OpenAI-compatible server flags. Swap image + args for vLLM
          # if you prefer that runtime; the contract is an OpenAI /v1 endpoint.
          args:
            - "-m"
            - {{ .Values.qwen.modelPath | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--alias"
            - {{ .Values.qwen.alias | quote }}
            - "-c"
            - {{ .Values.qwen.contextSize | quote }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- if .Values.qwen.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.qwen.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.qwen.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.qwen.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.qwen.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.qwen.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: {{ .Values.qwen.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.qwen.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.qwen.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.qwen.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.qwen.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /models
      {{- with .Values.qwen.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qwen.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.qwen.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: models
          {{- if .Values.qwen.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ $name }}-models
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
