name: Publish

# Builds the Mnemozine image (Python services + bundled React SPA) and the Helm
# chart, publishing both to GitHub Container Registry (GHCR).
#
# - pull_request          : BUILD ONLY (validates the Dockerfile + SPA build)
# - push to main          : BUILD + PUSH image as :latest and :sha-<short> (no chart)
# - push tag v*.*.*        : BUILD + PUSH image (semver + sha) AND push the Helm chart
#
# Cut a release with:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  # ghcr.io/<owner>/mnemozine — metadata-action lowercases the owner.
  IMAGE: ghcr.io/${{ github.repository_owner }}/mnemozine

jobs:
  image:
    name: build + publish image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Authenticate whenever we publish (main pushes + tags), never on PRs.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main + tags)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    name: package + publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint deploy/helm/mnemozine

      - name: Log in to GHCR (helm OCI)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package + push chart
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          # Chart version + appVersion track the release tag; the chart's default
          # image tag falls back to .Chart.AppVersion, so it pulls the matching image.
          helm package deploy/helm/mnemozine --version "${VERSION}" --app-version "${VERSION}"
          helm push "mnemozine-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"
          echo "Published oci://ghcr.io/${OWNER}/charts/mnemozine:${VERSION}"
